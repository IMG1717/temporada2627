<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UROS DE RIVAS - Revisión Temporada 26/27</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

</head>

<body>

<header class="header">
    <img src="assets/logo.jpg" class="logo" alt="Uros de Rivas">
    <div>
        <h1>Revisión Temporada 2026/27</h1>
        <p>Comprobación de jugadores y dorsales</p>
    </div>
</header>

<section class="panel">

    <input id="nombre" placeholder="Nombre del revisor">

    <input id="buscar" placeholder="Buscar jugador o equipo...">

    <div class="stats">

        <div class="stat">
            <span id="equiposTotal">0</span>
            <small>Equipos</small>
        </div>

        <div class="stat">
            <span id="jugadoresTotal">0</span>
            <small>Jugadores</small>
        </div>

        <div class="stat">
            <span id="revisados">0</span>
            <small>Revisados</small>
        </div>

    </div>

</section>

<div id="equipos"></div>

<div class="botones">

<button id="enviar">
    Enviar revisión
</button>

    <button id="limpiar">
        Nueva revisión
    </button>

</div>
<iframe
    name="oculto"
    style="display:none">
</iframe>
<script src="script.js"></script>

</body>
</html>
